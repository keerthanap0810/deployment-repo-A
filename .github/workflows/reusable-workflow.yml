# .github/workflows/reusable-deployment.yml (in Repo A)
name: Reusable Deployment Workflow

on:
  workflow_call:
    secrets:
      REPO_A_ACCESS_TOKEN:
        required: true

jobs:
  execute-deployment:
    runs-on: ubuntu-latest
    steps:
      # CHECKOUT 1: Grabs Repo B (Puts config.yaml in the root)
      - name: Checkout Repo B (Configs)
        uses: actions/checkout@v4

      # CHECKOUT 2: Grabs Repo A (Puts scripts into the 'repo-a-tools' folder)
      - name: Checkout Repo A (Scripts)
        uses: actions/checkout@v4
        with:
          repository: keerthanap0810/deployment-repo-A
          path: repo-a-tools
          token: ${{ secrets.REPO_A_ACCESS_TOKEN }}

      # NEW STEP: Print the directory structure to the logs!
      - name: Show Folder Structure
        run: |
          echo "📁 Here is exactly what the runner's folders look like right now:"
          tree -a -L 3

      # Run the script
      - name: Run Deployment Script
        run: |
          chmod +x ./repo-a-tools/deploy.sh
          ./repo-a-tools/deploy.sh

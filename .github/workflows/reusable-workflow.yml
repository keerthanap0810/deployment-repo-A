name: Repo A Reusable Workflow

on:
  workflow_call:
    inputs:
      greeting:
        description: 'A message passed from Repo B'
        required: true
        type: string
    # We must declare that this workflow expects a secret to be passed to it
    secrets:
      REPO_A_ACCESS_TOKEN:
        required: true

jobs:
  run-repo-a-job:
    runs-on: ubuntu-latest
    steps:
      - name: Print the greeting
        run: |
          echo "📨 Message from Repo B: ${{ inputs.greeting }}"

      # Step 1: Check out Repo A's code so we have access to hello.sh
      - name: Checkout Repo A
        uses: actions/checkout@v4
        with:
          repository: keerthanap0810/deployment-repo-A
          # Using the secret passed from Repo B
          token: ${{ secrets.REPO_A_ACCESS_TOKEN }}

      # Step 2: Make the script executable and run it
      - name: Execute hello.sh
        run: |
          echo "========================================"
          echo "⚙️ Executing script..."
          chmod +x ./hello.sh
          ./hello.sh
          echo "========================================"
